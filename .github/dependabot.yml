version: 2
updates:
  # Python dependencies (infra/requirements-airflow.txt, infra/requirements-spark.txt)
  - package-ecosystem: "pip"
    directory: "/infra"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(pip)"

  # Base images in infra/Dockerfile.airflow and infra/Dockerfile.spark
  - package-ecosystem: "docker"
    directory: "/infra"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(actions)"
