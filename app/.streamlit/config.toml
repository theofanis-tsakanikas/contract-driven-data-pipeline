# Streamlit theme for the Marts BI dashboard.
#
# Matches the dark cyan branding of the rest of the portfolio (agent, fleet,
# sensor wall) so everything reads as one coherent product suite.

[theme]
base                     = "dark"
primaryColor             = "#38bdf8"
backgroundColor          = "#070e20"
secondaryBackgroundColor = "#0d1b35"
textColor                = "#e2e8f0"

[client]
toolbarMode = "viewer"
