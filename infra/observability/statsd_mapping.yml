# Maps Airflow's dotted StatsD metric names into clean Prometheus metrics with
# labels (dag_id / task_id / state), instead of baking those into the metric
# name. Unmatched metrics still pass through with default naming.
mappings:
  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success_ms"
    labels:
      dag_id: "$1"
  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_failed_ms"
    labels:
      dag_id: "$1"
  - match: "airflow.dagrun.*.first_task_scheduling_delay"
    name: "airflow_dagrun_first_task_scheduling_delay_ms"
    labels:
      dag_id: "$1"
  - match: "airflow.ti.finish.*.*.*"
    name: "airflow_task_finish_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
      state: "$3"
  - match: "airflow.ti.start.*.*"
    name: "airflow_task_start_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool: "$1"
  - match: "airflow.pool.running_slots.*"
    name: "airflow_pool_running_slots"
    labels:
      pool: "$1"
