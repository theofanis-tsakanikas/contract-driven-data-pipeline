global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Airflow metrics, bridged from StatsD (UDP) by statsd-exporter.
  - job_name: 'airflow-statsd'
    static_configs:
      - targets: ['statsd-exporter:9102']

  # Prometheus scraping itself (handy for the "is monitoring alive?" panel).
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
