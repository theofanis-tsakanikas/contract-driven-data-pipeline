version: 2

sources:
  - name: raw
    description: "Tables loaded by the Airflow ETL pipeline."
    schema: public
    tables:
      - name: users
        description: "Cleaned user records bulk-loaded by load_to_db_final.py."
        columns:
          - name: user_id
            description: "Deterministic MD5 surrogate key (md5 of name||email||phone)."
            tests:
              - not_null
              - unique
